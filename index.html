<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Bot Operadora</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link rel="stylesheet" href="./css/styles.css">
    </head>
    <body class="bg-slate-950 h-screen flex items-center justify-center text-white font-sans">
        <div id="particles-js" class="fixed inset-0 w-full h-full z-0"></div>
        <div class="relative z-10 w-full max-w-lg bg-slate-900 rounded-2xl shadow-2xl border border-slate-700 overflow-hidden">

            <div class="bg-gradient-to-b from-indigo-700 to-indigo-900 py-6 relative text-center">

                <img src="./assets/logo.png"
                    class="mx-auto w-32 md:w-40 drop-shadow-xl mb-3"
                    alt="Logo">

                <p class="text-xs tracking-[0.3em] text-indigo-200 uppercase">
                    TU AGENTE IA
                </p>
            </div>


            <div id="selector-agente" class="flex gap-6 justify-center p-4">
                <button onclick="seleccionarAgente('ian')" class="bg-slate-800 hover:bg-indigo-600 p-4 rounded-xl">
                    <img src="./assets/IAN.gif" alt=""><br>
                    Ian<br><span class="text-xs text-gray-400">Chat de texto</span>
                </button>

                <button onclick="seleccionarAgente('mia')" class="bg-slate-800 hover:bg-pink-600 p-4 rounded-xl">
                    <img src="./assets/MIA.gif" alt=""><br>
                    Mia<br><span class="text-xs text-gray-400">Chat de texto</span>
                </button>
            </div>

            <div id="bloque-avatar"   class="p-6 flex flex-col items-center relative min-h-[150px] hidden">
                <img id="avatar-img"
                    src="./assets/saludo.gif"
                    onerror="this.src='https://via.placeholder.com/150?text=Bot'"
                    class="bg-white w-40 h-24 object-contain">

                <p id="estado-texto" class="text-indigo-300 font-mono text-sm uppercase tracking-widest mt-4">Cargando destinos...</p>
            </div>

            <div class="bg-slate-950/50 h-[450px] overflow-y-auto p-4 space-y-3 border-t border-slate-800" id="chat-box">
                <p class="text-gray-500 text-center italic text-xs">-- Consola de Interacción --</p>
            </div>

            <div id="input-area" class="px-4 py-3 bg-slate-900 border-t border-slate-800 hidden">
                <div class="flex gap-2">
                    <input
                        id="text-input"
                        type="text"
                        placeholder="Escribe tu mensaje..."
                        disabled
                        autocomplete="off"
                        class="flex-1 bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-indigo-500 disabled:opacity-50">
                    <button
                        id="btn-send"
                        disabled
                        class="bg-indigo-600 hover:bg-indigo-500 disabled:bg-gray-600 disabled:cursor-not-allowed text-white px-4 py-2 rounded-lg font-semibold text-sm transition">
                        Enviar
                    </button>
                </div>
            </div>

            <button id="btn-start" onclick="iniciar()" disabled class="w-full bg-gray-600 cursor-not-allowed py-4 font-bold text-lg transition opacity-50 hidden rounded-b-xl">
                CARGANDO BASE DE DATOS...
            </button>
        </div>

        <!-- Overlay de "procesando": cubre casi toda la pantalla mientras se espera
             la respuesta del modelo (nivel 3). Oculto por defecto. -->
        <div id="overlay-procesando" class="hidden fixed inset-0 z-50 flex flex-col items-center justify-center bg-slate-950/90 backdrop-blur-sm text-center px-8">
            <div class="relative w-24 h-24 mb-8">
                <div class="absolute inset-0 rounded-full border-4 border-indigo-500/20"></div>
                <div class="absolute inset-0 rounded-full border-4 border-transparent border-t-indigo-400 animate-spin"></div>
                <img src="./assets/logo.png" alt="" class="absolute inset-0 m-auto w-10 h-10 object-contain opacity-90">
            </div>
            <p class="text-indigo-100 font-semibold text-lg md:text-xl max-w-sm leading-relaxed">
                Espere un momento, estamos preparando para usted la información más precisa
            </p>
            <div class="flex gap-1.5 mt-6">
                <span class="w-2.5 h-2.5 rounded-full bg-indigo-400 animate-bounce" style="animation-delay:0ms"></span>
                <span class="w-2.5 h-2.5 rounded-full bg-indigo-400 animate-bounce" style="animation-delay:150ms"></span>
                <span class="w-2.5 h-2.5 rounded-full bg-indigo-400 animate-bounce" style="animation-delay:300ms"></span>
            </div>
        </div>

        <!--
            Orden de carga importante:
            1) data.js   -> define BASE_CONOCIMIENTO, AGENTES, VOZ_MASCULINA, VOZ_FEMENINA
            2) brain.js  -> usa esas variables y define toda la lógica (cerebro, hablar, etc.)
            3) particles.js (librería) + particles-config.js -> inicializa el fondo animado
        -->
        <script src="./js/data.js"></script>
        <script src="./js/brain.js"></script>

        <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
        <script src="./js/particles-config.js"></script>
    </body>
</html>
